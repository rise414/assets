<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB.DOT | White Cinematic Expansion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            /* 기본 배경을 흰색으로 세팅 */
            background-color: #fff;
            overflow: hidden;
        }

        .hero-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            overflow: hidden;
            cursor: pointer;
        }

        /* 1. 맨 뒤에 깔리는 우주 비디오 */
        .bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* 2. 비디오를 덮는 새하얀 마스크 레이어 */
        .text-mask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            
            /* 💡 핵심 1: 새하얀 배경에 '새까만' 글씨 */
            background-color: #ffffff; 
            color: #000000;            
            
            /* 💡 핵심 2: screen 모드를 쓰면 검은색 글씨 부분만 투명하게 뻥 뚫림! */
            mix-blend-mode: screen; 
            z-index: 2;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: 'Montserrat', sans-serif;
            font-size: 18vw; 
            font-weight: 900;
            letter-spacing: -0.05em;
            white-space: nowrap;

            /* 글자 안으로 빨려 들어가는 애니메이션 세팅 */
            transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1), 
                        opacity 1.2s ease-in-out;
        }

        /* 3. 마우스를 올렸을 때의 변화 */
        .hero-section:hover .text-mask {
            /* 글자가 거대하게 커지면서 뚫린 공간(O, D 같은 글자 속) 안으로 쑥 들어감 */
            transform: scale(40);
            /* 하얀 배경이 서서히 사라지면서 영상이 풀스크린으로 짠! 나타남 */
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <video class="bg-video" autoplay loop muted playsinline>
            <source src="https://cdn.coverr.co/videos/coverr-stars-in-the-night-sky-5264/1080p.mp4" type="video/mp4">
        </video>

        <div class="text-mask">
            PB.DOT
        </div>
    </div>

</body>
</html>
